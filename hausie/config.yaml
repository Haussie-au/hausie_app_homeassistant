name: Hausie App
slug: hausie
version: "0.2.71"
description: Hausie add-on for Home Assistant OS
arch:
  - aarch64
  - armhf
  - amd64
startup: services
boot: auto
homeassistant_api: true
hassio_api: true
hassio_role: manager
host_network: false
ingress: true
ingress_port: 8000
ingress_entry: /setup
panel_title: Hausie App Logs
panel_icon: mdi:clipboard-text
panel_admin: true
ports:
  8000/tcp: 8000
map:
  - type: addon_config
    read_only: false
  - type: homeassistant_config
    read_only: false
