name: Hausie App
slug: hausie
version: "0.2.27"
description: Hausie add-on for Home Assistant OS
arch:
  - aarch64
  - armv7
  - amd64
startup: services
boot: auto
homeassistant_api: true
hassio_api: true
hassio_role: manager
host_network: false
ingress: true
ingress_port: 8000
panel_title: Hausie App Logs
panel_icon: mdi:clipboard-text
panel_admin: true
ports:
  8000/tcp: 8000
map:
  - type: addon_config
    read_only: false
  - type: homeassistant_config
    read_only: false
options:
  ha_token: ""
  ha_ui_username: ""
  ha_ui_password: ""
  hausie_cloud_url: ""
  pairing_code: ""
  tailscale_ip: ""
  log_file: ""
  log_to_stdout: true
  log_clear_on_start: false
  log_max_bytes: 1048576
  manage_tailscale: true
  tailscale_addon_slug: "a0d7b954_tailscale"
schema:
  ha_token: password?
  ha_ui_username: str?
  ha_ui_password: password?
  hausie_cloud_url: str?
  pairing_code: password?
  tailscale_ip: str?
  log_file: str?
  log_to_stdout: bool?
  log_clear_on_start: bool?
  log_max_bytes: int?
  manage_tailscale: bool?
  tailscale_addon_slug: str?
