type: sections
max_columns: 10
title: Main
path: main
sections:
  - type: grid
    cards:
      - type: heading
        heading: Help
        heading_style: subtitle
        badges:
          - type: entity
            show_state: false
            show_icon: true
            entity: input_boolean.ui_help_main
            icon: mdi:close
            tap_action:
              action: call-service
              service: input_boolean.turn_off
              target:
                entity_id: input_boolean.ui_help_main
        grid_options:
          columns: 48
          rows: auto
        visibility:
          - condition: state
            entity: input_boolean.ui_help_main
            state: "on"
      - type: markdown
        content: "{{ states('input_text.ui_help_message_main') }}"
        text_only: true
        grid_options:
          columns: 48
          rows: auto
        visibility:
          - condition: state
            entity: input_boolean.ui_help_main
            state: "on"
    column_span: 10
  - type: grid
    columns: 2
    square: false
    cards:
      - show_name: true
        show_icon: true
        type: button
        icon: mdi:key-chain-variant
        grid_options:
          columns: 12
          rows: 2
        name: Set Hausie credentials
        tap_action:
          action: url
          url_path: /config/app/c5bb2897_hausie/ingress/credentials
      - show_name: true
        show_icon: true
        type: button
        entity: input_button.core_sync_inventory
        grid_options:
          columns: 12
          rows: 2
        name: Refresh Hausie
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.popup
            data:
              title: Refresh Hausie
              dismissable: false
              content:
                type: markdown
                content: >-
                  Use this after adding, moving, or changing devices in Home Assistant.
                  Hausie will refresh your home layout and device setup.
              left_button: Cancel
              left_button_action:
                action: call-service
                service: browser_mod.close_popup
              right_button: Continue
              right_button_action:
                action: call-service
                service: browser_mod.sequence
                data:
                  sequence:
                    - service: browser_mod.close_popup
                    - service: browser_mod.popup
                      data:
                        dismissable: false
                        title: Refresh Hausie
                        content:
                          type: vertical-stack
                          cards:
                            - type: custom:button-card
                              icon: mdi:loading
                              show_name: false
                              show_state: false
                              styles:
                                card:
                                  - height: 120px
                                  - background: transparent
                                  - box-shadow: none
                                icon:
                                  - width: 48px
                                  - height: 48px
                                  - animation: spin 1s linear infinite
                              extra_styles: |
                                @keyframes spin {
                                  from {
                                    transform: rotate(0deg);
                                  }
                                  to {
                                    transform: rotate(360deg);
                                  }
                                }
                            - type: markdown
                              content: >-
                                Refreshing Hausie. Please wait while devices, rooms,
                                groups, dashboards, and automations are updated.
                              text_only: true
                    - service: rest_command.sync_inventory
                    - service: browser_mod.close_popup
                    - service: browser_mod.popup
                      data:
                        title: Hausie refreshed
                        content:
                          type: markdown
                          content: >-
                            Hausie finished updating your home setup.
                          text_only: true
                        left_button: Close
                        left_button_action:
                          action: call-service
                          service: browser_mod.close_popup
        hold_action:
          action: none
        double_tap_action:
          action: none
      - show_name: true
        show_icon: true
        type: button
        icon: mdi:account-group
        tap_action:
          action: navigate
          navigation_path: /config-dashboard/users
        name: Users
      - show_name: true
        show_icon: true
        type: button
        icon: mdi:plus-box-outline
        tap_action:
          action: navigate
          navigation_path: /config/areas/dashboard
        name: Areas
      - show_name: true
        show_icon: true
        type: button
        tap_action:
          action: navigate
          navigation_path: /config-dashboard/automations
        name: Automations
        icon: mdi:refresh-auto
      - show_name: true
        show_icon: true
        type: button
        tap_action:
          action: navigate
          navigation_path: /config-dashboard/devices
        icon: mdi:devices
        name: Devices
      - show_name: true
        show_icon: true
        type: button
        icon: mdi:plus-box-outline
        tap_action:
          action: navigate
          navigation_path: /config/devices/dashboard
        name: Add Device
      - show_name: true
        show_icon: true
        type: button
        tap_action:
          action: navigate
          navigation_path: /config-dashboard/battery
        icon: mdi:battery
        name: Battery
      - show_name: true
        show_icon: true
        type: button
        entity: input_button.core_rebuild_hausie
        name: Repair Hausie
        icon: mdi:home-assistant
        tap_action:
          action: fire-dom-event
          browser_mod:
            service: browser_mod.popup
            data:
              title: Repair Hausie
              dismissable: false
              content:
                type: markdown
                content: >-
                  Use this if something is missing or not working correctly.
                  Hausie will rebuild your setup from the current Home Assistant data.
              left_button: Cancel
              left_button_action:
                action: call-service
                service: browser_mod.close_popup
              right_button: Continue
              right_button_action:
                action: call-service
                service: browser_mod.sequence
                data:
                  sequence:
                    - service: browser_mod.close_popup
                    - service: browser_mod.popup
                      data:
                        dismissable: false
                        title: Repair Hausie
                        content:
                          type: vertical-stack
                          cards:
                            - type: custom:button-card
                              icon: mdi:loading
                              show_name: false
                              show_state: false
                              styles:
                                card:
                                  - height: 120px
                                  - background: transparent
                                  - box-shadow: none
                                icon:
                                  - width: 48px
                                  - height: 48px
                                  - animation: spin 1s linear infinite
                              extra_styles: |
                                @keyframes spin {
                                  from {
                                    transform: rotate(0deg);
                                  }
                                  to {
                                    transform: rotate(360deg);
                                  }
                                }
                            - type: markdown
                              content: >-
                                Repairing Hausie. Please wait while rooms, devices,
                                groups, dashboards, helpers, and automations are rebuilt.
                              text_only: true
                    - service: rest_command.rebuild_hausie
                    - service: browser_mod.close_popup
                    - service: browser_mod.popup
                      data:
                        title: Hausie repaired
                        content:
                          type: markdown
                          content: >-
                            Hausie finished rebuilding and reapplying your setup.
                          text_only: true
                        left_button: Close
                        left_button_action:
                          action: call-service
                          service: browser_mod.close_popup
        hold_action:
          action: none
        double_tap_action:
          action: none
      - show_name: true
        show_icon: true
        type: button
        name: Reactivate help boxes
        icon: mdi:help
        show_state: false
        grid_options:
          columns: 12
          rows: 2
        tap_action:
          action: call-service
          service: script.ui_help_reset
      - show_name: true
        show_icon: true
        type: button
        name: Hausie App
        icon: mdi:home-assistant
        tap_action:
          action: url
          url_path: /config/app/c5bb2897_hausie/info
      - show_name: true
        show_icon: true
        type: button
        name: Legal documents
        icon: mdi:file-document-outline
        tap_action:
          action: url
          url_path: https://www.hausiehome.com/portal/legal
    column_span: 1
badges:
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    name: Hausie Plan
    entity: input_text.hausie_plan_text
    icon: mdi:home-heart
    color: primary
    tap_action:
      action: fire-dom-event
      browser_mod:
        service: browser_mod.popup
        data:
          title: Hausie plan
          content:
            type: markdown
            content: "{{ states('input_text.hausie_plan_details') }}"
            text_only: true
          left_button: Back
          left_button_action:
            action: call-service
            service: browser_mod.close_popup
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    name: Free trial until
    entity: input_text.hausie_trial_until
    icon: mdi:calendar-clock
    visibility:
      - condition: state
        entity: input_text.hausie_trial_until
        state_not: ""
  - type: entity
    entity: input_boolean.allow_remote_support
    show_name: true
    show_state: true
    show_icon: true
    name: Remote Support
    icon: mdi:face-agent
    tap_action:
      action: fire-dom-event
      browser_mod:
        service: browser_mod.popup
        data:
          title: Remote Support
          content:
            type: vertical-stack
            cards:
              - type: grid
                columns: 1
                square: false
                cards:
                  - type: markdown
                    content: >-
                      Only activate the remote support when indicated by one of our
                      agents, if not it can become a security vulnerability for your
                      smart house.<br><br><br>
                    text_only: true
                  - type: glance
                    entities:
                      - entity: input_boolean.allow_remote_support
                        icon: mdi:face-agent
                        tap_action:
                          action: toggle
                  - type: markdown
                    content: <br><br>
                    text_only: true
          left_button: Cancel
          left_button_action:
            action: call-service
            service: browser_mod.close_popup
header:
  layout: start
  badges_position: bottom
  badges_wrap: wrap
  card:
    type: markdown
    text_only: true
    content: "## Main"
cards: []
